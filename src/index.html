<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --code-bg:   #1e2530;
    --amber:     #fbbf24;
    --cyan:      #22d3ee;

    font-family: "SF Mono", "Menlo", "Monaco", "Cascadia Code", monospace;
    font-size: 12px;
    line-height: 1.5;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  #header {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px 8px 78px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    min-height: 40px;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }
  #header > * { -webkit-app-region: no-drag; }

  #app-name {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; letter-spacing: 0.03em;
    pointer-events: none;
    z-index: 1;
  }

  #team-select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 11px;
    padding: 2px 6px; border-radius: 4px; cursor: pointer; outline: none;
    max-width: 160px;
  }
  #team-select:focus { border-color: var(--cyan); }
  #team-select option { background: var(--surface); }

  #search-input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 11px;
    padding: 2px 6px; border-radius: 4px; outline: none;
    width: 140px;
  }
  #search-input:focus { border-color: var(--cyan); }
  #search-input::placeholder { color: var(--muted); }

  .spacer { flex: 1; }

  #btn-clear {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: inherit; font-size: 10px; padding: 2px 8px; border-radius: 4px;
    cursor: pointer; letter-spacing: 0.04em; transition: color 0.15s, border-color 0.15s;
  }
  #btn-clear:hover { color: var(--text); border-color: var(--muted); }

  /* Chip bar */
  #chips {
    display: flex; gap: 5px; padding: 5px 14px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    overflow-x: auto; flex-shrink: 0; min-height: 30px; scrollbar-width: none;
  }
  #chips::-webkit-scrollbar { display: none; }

  .chip {
    display: inline-flex; align-items: center; gap: 4px; padding: 1px 8px;
    border-radius: 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
    white-space: nowrap; border: 1px solid transparent; cursor: default;
    text-transform: lowercase; flex-shrink: 0;
  }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* Chat area */
  #chat { flex: 1; overflow-y: auto; padding: 8px 0; }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex; flex-direction: column;
    padding: 4px 14px; border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .msg:hover { background: rgba(255,255,255,0.02); }

  .msg-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }

  .msg-avatar {
    width: 18px; height: 18px; border-radius: 3px; font-size: 9px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    text-transform: uppercase;
  }
  .msg-route   { font-weight: 600; font-size: 11px; }
  .msg-arrow   { color: var(--muted); font-size: 10px; }
  .msg-target  { font-size: 11px; font-weight: 500; }
  .msg-badge   { font-size: 9px; color: var(--muted); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; }
  .msg-ts      { font-size: 9px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

  .msg-body {
    font-size: 11px; color: var(--text); padding-left: 24px;
    white-space: pre-wrap; word-break: break-word;
    transition: max-height 0.2s;
  }
  .msg-body.collapsed { max-height: 200px; overflow: hidden; }
  .msg-collapse-btn {
    display: block; margin-left: 24px; margin-top: 4px;
    background: none; border: none; padding: 0;
    font-size: 9px; color: var(--muted); cursor: pointer;
    font-family: inherit;
  }
  .msg-collapse-btn:hover { color: var(--text); }
  .msg-body code { background: var(--code-bg); border-radius: 3px; padding: 0 3px; font-size: 10px; }
  .msg-body strong { font-weight: 700; }
  .msg-body em { font-style: italic; color: #b0bec5; }

  /* System messages */
  .sys-row { padding: 3px 14px; color: var(--muted); font-size: 10px; font-style: italic; }
  .sys-label { color: var(--amber); font-style: normal; font-weight: 600; margin-right: 4px; }
  .sys-ts { float: right; }

  /* Empty */
  #empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); gap: 6px; font-size: 11px; text-align: center;
  }
  #empty-icon { font-size: 28px; opacity: 0.4; }
  #empty-hint { font-size: 9px; margin-top: 4px; opacity: 0.6; }

  /* Footer */
  #footer {
    display: flex; align-items: center; gap: 8px; padding: 4px 14px;
    background: var(--bg); border-top: 1px solid var(--border);
    font-size: 10px; color: var(--muted); flex-shrink: 0; min-height: 24px;
  }
  #filter-status { color: var(--cyan); }

  /* Scroll-to-bottom */
  #scroll-btn {
    position: fixed; bottom: 32px; right: 14px;
    background: var(--cyan); color: var(--bg);
    border: none; border-radius: 50%; width: 26px; height: 26px;
    font-size: 13px; cursor: pointer; display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); z-index: 10;
  }
  #scroll-btn.visible { display: flex; }

  /* Modal overlay */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 30;
    background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 28px; min-width: 400px; max-width: 560px;
    max-height: 80vh; overflow-y: auto;
  }
  .modal-panel h3 {
    font-size: 12px; font-weight: 600; margin-bottom: 14px;
    color: var(--text); text-transform: lowercase;
  }
  .field-group { margin-bottom: 12px; }
  .field-label {
    display: block; font-size: 10px; color: var(--muted);
    margin-bottom: 3px; text-transform: lowercase;
  }
  .field-row { display: flex; gap: 6px; align-items: center; }
  .field-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 11px;
    padding: 4px 8px; border-radius: 4px; outline: none;
  }
  .field-input:focus { border-color: var(--cyan); }
  .field-input::placeholder { color: var(--muted); }
  .btn-sm {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: inherit; font-size: 9px; padding: 3px 10px; border-radius: 4px;
    cursor: pointer; white-space: nowrap; transition: color 0.15s, border-color 0.15s;
  }
  .btn-sm:hover { color: var(--text); border-color: var(--muted); }
  .btn-primary {
    background: var(--cyan); border: 1px solid var(--cyan); color: var(--bg);
    font-family: inherit; font-size: 10px; padding: 4px 14px; border-radius: 4px;
    cursor: pointer; font-weight: 600;
  }
  .btn-primary:hover { opacity: 0.9; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .status-dot.ok { background: #34d399; }
  .status-dot.none { background: var(--border); }
  .status-dot.error { background: #f87171; }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
    padding-top: 12px; border-top: 1px solid var(--border);
  }

  /* Debate control bar */
  #debate-controls {
    display: none; align-items: center; gap: 6px;
    font-size: 10px; color: var(--muted);
  }
  #debate-controls.active { display: flex; }
  #debate-status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    animation: pulse-status 1.5s infinite;
  }
  #debate-status-dot.running { background: #34d399; }
  #debate-status-dot.paused { background: var(--amber); animation: none; }
  #debate-status-dot.stopped { background: var(--muted); animation: none; }
  #debate-status-dot.converged { background: var(--cyan); animation: none; }
  #debate-status-dot.error { background: #f87171; animation: none; }
  @keyframes pulse-status { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Authority messages */
  .msg-authority {
    background: color-mix(in srgb, var(--amber) 5%, var(--surface));
  }
  .authority-badge {
    display: inline-block;
    margin-left: 5px;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: color-mix(in srgb, var(--amber) 20%, transparent);
    color: var(--amber);
    border: 1px solid color-mix(in srgb, var(--amber) 40%, transparent);
    vertical-align: middle;
  }

  /* Thinking bubble */
  .thinking-bubble {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; margin: 0; border-radius: 6px;
    border-left: 3px solid var(--border);
  }
  .thinking-avatar {
    width: 22px; height: 22px; border-radius: 4px;
    font-size: 9px; font-weight: 600; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .thinking-name {
    font-size: 11px; font-weight: 600; opacity: 0.85;
  }
  .thinking-dots {
    display: flex; gap: 4px; align-items: center; margin-left: 2px;
  }
  .thinking-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); display: inline-block;
    animation: thinking-bounce 1.2s infinite ease-in-out;
  }
  .thinking-dots span:nth-child(1) { animation-delay: 0s; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .btn-enhance {
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-size: 11px; padding: 0 2px;
    line-height: 1; transition: color 0.15s, opacity 0.15s;
    position: relative;
  }
  .btn-enhance:hover { color: var(--cyan); }
  .btn-enhance.loading { animation: spin 0.8s linear infinite; pointer-events: none; }
  .btn-enhance .tooltip {
    display: none; position: absolute; bottom: 120%; left: 50%;
    transform: translateX(-50%); white-space: nowrap;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 10px; padding: 3px 7px; border-radius: 4px;
    pointer-events: none; z-index: 100;
  }
  .btn-enhance:hover .tooltip { display: block; }

  @keyframes thinking-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 10px; padding: 5px 14px; border-radius: 4px;
    z-index: 50; opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  #toast.visible { opacity: 1; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <select id="team-select">
      <option value="">all teams</option>
    </select>
    <button id="btn-delete-team" class="btn-sm" title="delete team" style="display:none;color:#f87171;border-color:#f8717144">×</button>
    <button id="btn-new-debate" class="btn-sm">+ debate</button>
    <input id="search-input" type="text" placeholder="search... (⌘K)">
    <div id="debate-controls">
      <span id="debate-status-dot"></span>
      <span id="debate-status-text">stopped</span>
      <span id="debate-round-text"></span>
      <button class="btn-sm" id="btn-pause" title="pause/resume">⏸</button>
      <button class="btn-sm" id="btn-stop" title="stop">⏹</button>
      <button class="btn-sm" id="btn-restart" title="restart">⟳</button>
    </div>
    <div class="spacer"></div>
    <button id="btn-clear">clear</button>
    <button id="btn-settings" class="btn-sm" title="settings">⚙</button>
  </div>
  <span id="app-name">Agora</span>

  <div id="chips"></div>

  <div id="chat">
    <div id="empty">
      <div id="empty-icon">💬</div>
      <div>watching for messages…</div>
      <div id="empty-hint">~/.claude/teams/</div>
    </div>
  </div>

  <button id="scroll-btn" title="scroll to bottom">↓</button>

  <!-- Settings modal -->
  <div id="settings-overlay" class="modal-overlay">
    <div class="modal-panel">
      <h3>api keys</h3>
      <div id="settings-providers"></div>
      <h3 style="margin-top:16px">generation model</h3>
      <p style="color:var(--muted);font-size:10px;margin-bottom:8px">used for topic refinement and other single-shot AI calls. defaults to claude code (CLI) if unset.</p>
      <div class="field-group">
        <div class="field-row" style="gap:6px">
          <select id="settings-enhance-provider" class="field-input" style="flex:1">
            <option value="">auto</option>
          </select>
          <input id="settings-enhance-model" class="field-input" type="text" placeholder="model (optional)" style="flex:1">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-sm" id="settings-cancel">cancel</button>
        <button class="btn-primary" id="settings-save">save</button>
      </div>
    </div>
  </div>

  <!-- Wizard modal -->
  <div id="wizard-overlay" class="modal-overlay">
    <div class="modal-panel" style="min-width:480px">
      <div id="wizard-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3 id="wizard-title" style="margin:0">new debate</h3>
        <span id="wizard-step-indicator" style="font-size:9px;color:var(--muted)">step 1 of 4</span>
      </div>
      <div id="wizard-body"></div>
      <div class="modal-footer">
        <button class="btn-sm" id="wizard-back" style="display:none">back</button>
        <div class="spacer"></div>
        <button class="btn-sm" id="wizard-cancel">cancel</button>
        <button class="btn-primary" id="wizard-next">next</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="footer">
    <span id="msg-count">0 messages</span>
    <span id="filter-status"></span>
  </div>

</div>
<script>
// ── Agent colors ──────────────────────────────────────────────
const NAMED = {
  advocate:    '#22d3ee',
  critic:      '#f87171',
  synthesizer: '#a78bfa',
  'team-lead': '#fbbf24',
};
const FALLBACK = [
  '#34d399','#60a5fa','#fb923c','#e879f9',
  '#4ade80','#f472b6','#818cf8','#a3e635',
];
const colorCache = {};
let fallbackIdx  = 0;

function agentColor(name) {
  const k = name.toLowerCase();
  if (NAMED[k])       return NAMED[k];
  if (colorCache[k])  return colorCache[k];
  colorCache[k] = FALLBACK[fallbackIdx++ % FALLBACK.length];
  return colorCache[k];
}

// ── Helpers ───────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderMd(text) {
  // Escape first, then apply inline markdown
  return esc(text)
    .replace(/`([^`]+)`/g,   '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g,   '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,   '<em>$1</em>')
    .replace(/\n/g,          '<br>');
}

function fmtTime(ms) {
  return new Date(ms).toLocaleTimeString('en-US', {
    hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}

function initials(name) { return name.slice(0, 2).toUpperCase(); }

// ── State ─────────────────────────────────────────────────────
let messages      = [];
let currentFilter = null;
let autoScroll    = true;
const knownAgents = new Set();

// ── DOM refs ──────────────────────────────────────────────────
const $chat       = document.getElementById('chat');
const $chips      = document.getElementById('chips');
const $teamSelect = document.getElementById('team-select');
const $msgCount   = document.getElementById('msg-count');
const $filterStat = document.getElementById('filter-status');
const $scrollBtn  = document.getElementById('scroll-btn');
const $empty      = document.getElementById('empty');
const $search     = document.getElementById('search-input');

// ── Scroll ────────────────────────────────────────────────────
$chat.addEventListener('scroll', () => {
  const atBottom = $chat.scrollHeight - $chat.scrollTop - $chat.clientHeight < 60;
  autoScroll = atBottom;
  $scrollBtn.classList.toggle('visible', !atBottom);
});

$scrollBtn.addEventListener('click', () => {
  $chat.scrollTop = $chat.scrollHeight;
  autoScroll = true;
  $scrollBtn.classList.remove('visible');
});

function maybeScroll() {
  $chat.scrollTop = $chat.scrollHeight;
}

// ── Chip bar ──────────────────────────────────────────────────
function ensureChip(name) {
  if (knownAgents.has(name)) return;
  knownAgents.add(name);

  const color = agentColor(name);
  const chip  = document.createElement('span');
  chip.className       = 'chip';
  chip.style.color     = color;
  chip.style.borderColor = color + '44';
  chip.style.background  = color + '18';

  const dot  = document.createElement('span');
  dot.className       = 'chip-dot';
  dot.style.background = color;

  chip.appendChild(dot);
  chip.appendChild(document.createTextNode(name));
  $chips.appendChild(chip);
}

const AUTHORITY_ROLES = new Set(['moderator','synthesizer','arbiter','mediator','judge','facilitator']);
function isAuthority(role) {
  if (!role) return false;
  const r = role.toLowerCase();
  return AUTHORITY_ROLES.has(r) || [...AUTHORITY_ROLES].some(ar => r.includes(ar));
}

// ── Message rendering (DOM construction — no innerHTML with user data) ─────
function buildMessageNode(msg) {
  const fromColor = agentColor(msg.from);
  const toColor   = agentColor(msg.to);

  ensureChip(msg.from);
  ensureChip(msg.to);

  const authority = isAuthority(msg.role);
  const row = document.createElement('div');
  row.className = authority ? 'msg msg-authority' : 'msg';
  row.style.borderLeftColor = authority ? 'var(--amber)' : fromColor + '80';
  if (authority) row.style.borderLeftWidth = '3px';

  // — Meta row —
  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const avatar = document.createElement('span');
  avatar.className       = 'msg-avatar';
  avatar.style.background = fromColor + '22';
  avatar.style.color      = fromColor;
  avatar.textContent      = initials(msg.from);

  const route = document.createElement('span');
  route.className  = 'msg-route';
  route.style.color = fromColor;
  route.textContent = msg.from;

  if (authority) {
    const badge = document.createElement('span');
    badge.className = 'authority-badge';
    badge.textContent = msg.role || 'authority';
    route.appendChild(badge);
  }

  const arrow = document.createElement('span');
  arrow.className  = 'msg-arrow';
  arrow.textContent = '→';

  const target = document.createElement('span');
  target.className   = 'msg-target';
  target.style.color  = toColor;
  target.textContent  = msg.to;

  meta.append(avatar, route, arrow, target);

  if (!currentFilter) {
    const badge = document.createElement('span');
    badge.className  = 'msg-badge';
    badge.textContent = msg.team;
    meta.appendChild(badge);
  }

  const ts = document.createElement('span');
  ts.className  = 'msg-ts';
  ts.textContent = fmtTime(msg.timestamp);
  meta.appendChild(ts);

  // — Body (markdown via innerHTML is safe: renderMd pre-escapes all input) —
  const body = document.createElement('div');
  body.className = 'msg-body';
  body.innerHTML = renderMd(msg.content);   // safe: esc() runs first

  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'msg-collapse-btn';
  collapseBtn.textContent = '▲ collapse';
  collapseBtn.addEventListener('click', () => {
    const collapsed = body.classList.toggle('collapsed');
    collapseBtn.textContent = collapsed ? '▼ expand' : '▲ collapse';
  });

  row.append(meta, body, collapseBtn);
  return row;
}

// Detect idle/system noise that slipped through the backend filter
function isIdleNoise(msg) {
  const c = msg.content;
  if (!c) return false;
  // Raw JSON with idle_notification type
  const noiseTypes = ['idle_notification', 'heartbeat', 'ping', 'status_update', 'shutdown_request'];
  for (const t of noiseTypes) { if (c.includes(`"${t}"`)) return true; }
  // Try parsing — might be a stringified JSON object
  if (c.startsWith('{')) {
    try { const o = JSON.parse(c); if (noiseTypes.includes(o.type)) return true; } catch {}
  }
  return false;
}

function appendMessage(msg) {
  if (isIdleNoise(msg)) return; // silently drop
  $empty.style.display = 'none';
  $chat.appendChild(buildMessageNode(msg));
  maybeScroll();
}

// ── Thinking bubble ───────────────────────────────────────────
let $thinkingNode = null;
let thinkingAgent = null;

function showThinking(agentName, teamName) {
  clearThinking();
  if (currentFilter && teamName !== currentFilter) return;

  const color = agentColor(agentName);
  const row = document.createElement('div');
  row.className = 'thinking-bubble';
  row.style.borderLeftColor = color + '80';

  const avatar = document.createElement('span');
  avatar.className = 'thinking-avatar';

  name.className = 'thinking-name';
  name.style.color = color;
  name.textContent = agentName;

  dots.className = 'thinking-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';

  row.append(avatar, name, dots);
  $chat.appendChild(row);
  maybeScroll();

  $thinkingNode = row;
  thinkingAgent = agentName;
}

function clearThinking() {
  if ($thinkingNode) { $thinkingNode.remove(); $thinkingNode = null; thinkingAgent = null; }
}

function buildSystemNode(text) {
  const row   = document.createElement('div');
  row.className = 'sys-row';

  const label = document.createElement('span');
  label.className  = 'sys-label';
  label.textContent = '[system]';

  const tsEl = document.createElement('span');
  tsEl.className  = 'sys-ts';
  tsEl.textContent = fmtTime(Date.now());

  row.append(label, document.createTextNode(text), tsEl);
  return row;
}

function appendSystem(text) {
  $empty.style.display = 'none';
  $chat.appendChild(buildSystemNode(text));
  maybeScroll();
}

// ── Filter ────────────────────────────────────────────────────
function applyFilter() {
  // Clear search when switching teams
  $search.value = '';
  // Wipe chat (keep $empty node)
  while ($chat.firstChild) $chat.removeChild($chat.firstChild);
  $chat.appendChild($empty);
  knownAgents.clear();
  $chips.innerHTML = '';

  const visible = currentFilter
    ? messages.filter(m => m.team === currentFilter)
    : messages;

  if (visible.length === 0) {
    $empty.style.display = 'flex';
  } else {
    $empty.style.display = 'none';
    visible.forEach(m => $chat.appendChild(buildMessageNode(m)));
  }

  updateFooter();
  $chat.scrollTop = $chat.scrollHeight;
}

function updateFooter() {
  const n = currentFilter ? messages.filter(m => m.team === currentFilter).length : messages.length;
  $msgCount.textContent   = `${n} message${n !== 1 ? 's' : ''}`;
  $filterStat.textContent = currentFilter ? `· ${currentFilter}` : '';
}

// ── Team selector ─────────────────────────────────────────────
function populateTeams(teams) {
  const existing = new Set([...$teamSelect.options].map(o => o.value));
  for (const t of teams) {
    if (existing.has(t)) continue;
    const opt = document.createElement('option');
    opt.value       = t;
    opt.textContent = t;
    $teamSelect.appendChild(opt);
  }
}

const $btnDeleteTeam = document.getElementById('btn-delete-team');

$teamSelect.addEventListener('change', () => {
  currentFilter = $teamSelect.value || null;
  $btnDeleteTeam.style.display = currentFilter ? '' : 'none';
  applyFilter();
});

$btnDeleteTeam.addEventListener('click', async () => {
  if (!currentFilter) return;
  if (!window.confirm(`delete team "${currentFilter}"?\n\nthis removes the team folder from ~/.claude/teams/ and cannot be undone.`)) return;
  const { invoke } = window.__TAURI__.core;
  try {
    await invoke('delete_team', { team: currentFilter });
    // Remove from selector
    const opt = [...$teamSelect.options].find(o => o.value === currentFilter);
    if (opt) opt.remove();
    // Remove from messages and reset
    messages = messages.filter(m => m.team !== currentFilter);
    currentFilter = null;
    $teamSelect.value = '';
    $btnDeleteTeam.style.display = 'none';
    applyFilter();
    showToast('team deleted');
  } catch (err) {
    showToast(`error: ${err}`);
  }
});

// ── Clear ─────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  messages = [];
  $search.value = '';
  applyFilter();
});

// ── Search ────────────────────────────────────────────────────
function applySearch() {
  const q = $search.value.toLowerCase();
  const msgs = $chat.querySelectorAll('.msg');
  let visible = 0;
  msgs.forEach(el => {
    const match = !q || el.querySelector('.msg-body').textContent.toLowerCase().includes(q);
    el.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const total = msgs.length;
  $msgCount.textContent = q
    ? `${visible} of ${total} messages`
    : `${total} message${total !== 1 ? 's' : ''}`;
}

$search.addEventListener('input', applySearch);

// ── Keyboard shortcuts ───────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.metaKey && e.key === 'k') {
    e.preventDefault();
    $search.focus();
    $search.select();
  }
  if (e.metaKey && e.key === 'n') {
    e.preventDefault();
    document.getElementById('btn-new-debate').click();
  }
  if (e.key === 'Escape') {
    const settingsEl = document.getElementById('settings-overlay');
    const wizardEl = document.getElementById('wizard-overlay');
    if (settingsEl && settingsEl.classList.contains('visible')) {
      settingsEl.classList.remove('visible');
      return;
    }
    if (wizardEl && wizardEl.classList.contains('visible')) {
      wizardEl.classList.remove('visible');
      return;
    }
    if (document.activeElement === $search) {
      $search.value = '';
      $search.dispatchEvent(new Event('input'));
      $search.blur();
    }
  }
});

// ── Tauri bridge ──────────────────────────────────────────────
async function init() {
  const { invoke } = window.__TAURI__.core;
  const { listen  } = window.__TAURI__.event;

  // Load teams into selector
  const teams = await invoke('get_teams');
  populateTeams(teams);

  // Load existing messages (filter idle noise)
  const existing = await invoke('get_messages');
  for (const m of existing) { if (!isIdleNoise(m)) messages.push(m); }
  applyFilter();


  // Thinking indicator
  await listen('debate-thinking', ({ payload }) => {
    showThinking(payload.agent, payload.team);
  });

  // New message stream
  await listen('new-message', ({ payload: msg }) => {
    if (isIdleNoise(msg)) return;
    clearThinking();
    messages.push(msg);
    if (!currentFilter || msg.team === currentFilter) {
      $empty.style.display = 'none';
      const node = buildMessageNode(msg);
      $chat.appendChild(node);
      // Respect active search
      const q = $search.value.toLowerCase();
      if (q && !node.querySelector('.msg-body').textContent.toLowerCase().includes(q)) {
        node.style.display = 'none';
      }
      maybeScroll();
    }
    updateFooter();
  });

  // Task updates
  await listen('task-update', ({ payload: u }) => {
    appendSystem(`task "${u.subject}" → ${u.status} [${u.team}]`);
    updateFooter();
  });

  // New team detected
  await listen('team-added', ({ payload: teamName }) => {
    populateTeams([teamName]);
    appendSystem(`new team created: ${teamName}`);
  });

  // Debate controls
  await initDebateControls();
}

function waitForTauri() {
  if (window.__TAURI__) {
    init().catch(err => {
      console.error('init error:', err);
    });
  } else {
    setTimeout(waitForTauri, 50);
  }
}

async function loadSettings() {
  const { invoke } = window.__TAURI__.core;
  const config = await invoke('get_config');

    if (config.enhance_provider === p) opt.selected = true;
    enhanceProviderSel.appendChild(opt);
  });
  enhanceModelInput.value = config.enhance_model || '';

  for (const name of PROVIDERS) {
    const existing = config.providers[name] || { api_key: '', enabled: false };
    const group = document.createElement('div');
    group.className = 'field-group';

    const label = document.createElement('label');
    label.className = 'field-label';
    label.textContent = providerLabel(name);

    const row = document.createElement('div');
    row.className = 'field-row';

    const dot = document.createElement('span');
    dot.className = 'status-dot ' + (NO_KEY_PROVIDERS.has(name) ? 'ok' : (existing.api_key ? 'ok' : 'none'));
    dot.dataset.provider = name;

    let input;
    if (NO_KEY_PROVIDERS.has(name)) {
      input = document.createElement('span');
      input.className = 'field-input';
      input.style.cssText = 'color:var(--muted);font-style:italic;display:flex;align-items:center';
      input.textContent = 'uses Claude Code auth — no key needed';
      input.dataset.provider = name;
    } else {
      input = document.createElement('input');
      input.className = 'field-input';
      input.type = 'password';
      input.placeholder = `${name} API key`;
      input.value = existing.api_key || '';
      input.dataset.provider = name;
    }

    const testBtn = document.createElement('button');
    testBtn.className = 'btn-sm';
    testBtn.textContent = 'test';
    testBtn.addEventListener('click', async () => {
      testBtn.textContent = '...';
      try {
        await saveCurrentSettings();
        const models = await invoke('list_models', { providerName: name });
        modelListCache[name] = models; // refresh cache on explicit test
        dot.className = 'status-dot ok';
        testBtn.textContent = `✓ ${models.length}`;
        setTimeout(() => { testBtn.textContent = 'test'; }, 2000);
      } catch (err) {
        dot.className = 'status-dot error';
        testBtn.textContent = 'fail';
        setTimeout(() => { testBtn.textContent = 'test'; }, 2000);
      }
    });

    row.append(dot, input, testBtn);

  }
}

async function saveCurrentSettings() {
  const { invoke } = window.__TAURI__.core;
  const config = await invoke('get_config');
  const inputs = $settingsProviders.querySelectorAll('.field-input');
  inputs.forEach(input => {
    const name = input.dataset.provider;
    if (NO_KEY_PROVIDERS.has(name)) {
      config.providers[name] = { api_key: '', enabled: true };

// Attach a filter input above a <select>. Handles <optgroup> children.
// Returns the search input element.
function attachSelectSearch(selectEl, placeholder) {
  // Snapshot options preserving their group label
  const allOpts = [];
  selectEl.querySelectorAll('option').forEach(o => {
    allOpts.push({
      value: o.value,
      text: o.textContent,
      group: o.parentElement.tagName === 'OPTGROUP' ? o.parentElement.label : '',
      selected: o.selected,
    });
  });

  const search = document.createElement('input');
  search.className = 'field-input';
  search.type = 'text';
  search.placeholder = placeholder || '⌕ filter...';
  search.style.cssText = 'font-size:10px;padding:2px 6px;margin-bottom:2px';

  search.addEventListener('input', () => {
    const q = search.value.toLowerCase();
    const cur = selectEl.value;
    selectEl.innerHTML = '';

    const filtered = allOpts.filter(o => !q || o.text.toLowerCase().includes(q));

    // Rebuild preserving optgroups (skip empty groups when filtering)
    const groups = {};
    const groupOrder = [];
    filtered.forEach(o => {
      if (!groups[o.group]) { groups[o.group] = []; groupOrder.push(o.group); }
      groups[o.group].push(o);
    });

    groupOrder.forEach(g => {
      const container = g ? Object.assign(document.createElement('optgroup'), { label: g }) : selectEl;
      groups[g].forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.value;
        opt.textContent = o.text;
        if (o.value === cur) opt.selected = true;
        container.appendChild(opt);
      });
      if (g) selectEl.appendChild(container);
    });
  });

  selectEl.parentNode.insertBefore(search, selectEl);
  return search;
}

function inferProvider(model) {
  if (!model) return '';
  if (model.startsWith('claude-')) return 'anthropic';
  if (model.startsWith('gemini-')) return 'gemini';
  if (model.startsWith('gpt-') || model.startsWith('o1') || model.startsWith('o3')) return 'openai';
  if (model.startsWith('deepseek-')) return 'deepseek';
  if (model.startsWith('moonshot-') || model.startsWith('kimi-')) return 'moonshot';
  if (model.startsWith('MiniMax-M2') || model === 'MiniMax-M2.5') return 'minimax-coding';
  if (model.includes('/')) return 'openrouter';
  if (model.startsWith('glm-')) return 'zai';
  if (model.startsWith('MiniMax-') || model.startsWith('minimax-') || model.startsWith('abab')) return 'minimax';
  return '';
}

  removeBtn.textContent = '×';
  removeBtn.style.cssText = 'padding:2px 6px;font-size:12px';
  removeBtn.addEventListener('click', () => {
    if (wizardState.agents.length <= 2) { showToast('minimum 2 agents'); return; }
    saveStep2();
    wizardState.agents.splice(idx, 1);
    renderStep2();
  });

  headerRow.append(nameInput, removeBtn);

  const pmRow = document.createElement('div');
  pmRow.className = 'field-row';
  pmRow.style.marginBottom = '4px';

  const providerSelect = document.createElement('select');
  providerSelect.className = 'field-input';
  providerSelect.style.width = '120px';
  providerSelect.dataset.idx = idx;
  providerSelect.dataset.field = 'provider';
  const defaultOpt = document.createElement('option');
  defaultOpt.value = '';
  defaultOpt.textContent = 'provider...';
  providerSelect.appendChild(defaultOpt);
  PROVIDERS.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = providerLabel(p);
    if (agent.provider === p) opt.selected = true;
    providerSelect.appendChild(opt);
  });

  const modelInput = document.createElement('input');
  modelInput.className = 'field-input';
  modelInput.placeholder = 'model ID';
  modelInput.value = agent.model;
  modelInput.dataset.idx = idx;
  modelInput.dataset.field = 'model';

  function isFreeModel(id) {
    return id.endsWith(':free') || id.includes(':free-');
  }

  function modelLabel(id, pName) {
    if (pName === 'openrouter') {
      const slash = id.indexOf('/');
      if (slash !== -1) {
        const vendor = id.slice(0, slash);
        const model  = id.slice(slash + 1);
        return `${model}  [${vendor}]`;
      }
    }
    return id;
  }

  function makeModelSelect(models, currentValue, pName) {
    const free = models
      .filter(m => isFreeModel(m.id))
      .sort((a, b) => modelLabel(a.id, pName).localeCompare(modelLabel(b.id, pName)));
    const paid = models
      .filter(m => !isFreeModel(m.id))
      .sort((a, b) => modelLabel(a.id, pName).localeCompare(modelLabel(b.id, pName)));

    const sel = document.createElement('select');
    sel.className = 'field-input';
    sel.dataset.idx = idx;
    sel.dataset.field = 'model';

    const blank = document.createElement('option');
    blank.value = '';
    blank.textContent = '— select model —';
    sel.appendChild(blank);

    function addGroup(label, items) {
      if (!items.length) return;
      const grp = document.createElement('optgroup');
      grp.label = label;
      items.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = modelLabel(m.id, pName);
        if (currentValue === m.id) opt.selected = true;
        grp.appendChild(opt);
      });
      sel.appendChild(grp);
    }

    addGroup('free', free);
    addGroup('paid', paid);

    // if models had no free/paid split, render flat
    if (!free.length && !paid.length) {
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = modelLabel(m.id, pName);
        if (currentValue === m.id) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    const manualOpt = document.createElement('option');
    manualOpt.value = '__manual__';
    manualOpt.textContent = 'enter manually...';
    sel.appendChild(manualOpt);

    sel.addEventListener('change', () => {
      if (sel.value === '__manual__') {
        const inp = document.createElement('input');
        inp.className = 'field-input';
        inp.placeholder = 'model ID';
        inp.dataset.idx = idx;
        inp.dataset.field = 'model';
        sel.replaceWith(inp);
        inp.focus();
      }
    });
    return sel;
  }

  async function fetchAndReplaceModel(pName, currentEl, currentValue) {
    if (!pName) return;
    currentEl.placeholder = 'loading...';
    try {
      const { invoke } = window.__TAURI__.core;
      if (!modelListCache[pName]) {
        modelListCache[pName] = await invoke('list_models', { providerName: pName });
      }
      const models = modelListCache[pName];
      if (models.length > 0) {
        const sel = makeModelSelect(models, currentValue, pName);
        currentEl.replaceWith(sel);
      } else {
        currentEl.placeholder = 'model ID (no key configured)';
      }
    } catch {
      currentEl.placeholder = 'model ID (enter manually)';
    }
  }

  providerSelect.addEventListener('change', () => {
    const current = pmRow.querySelector('[data-field="model"]');
    fetchAndReplaceModel(providerSelect.value, current, current.value || agent.model);
  });

  if (agent.provider) {
    // pre-populate on render if provider already known
    fetchAndReplaceModel(agent.provider, modelInput, agent.model);
  }

  const providerWrap = document.createElement('div');
  providerWrap.style.cssText = 'display:flex;flex-direction:column;gap:0';
  providerWrap.appendChild(providerSelect);
  attachSelectSearch(providerSelect, '⌕ filter providers...');
  pmRow.append(providerWrap, modelInput);

  const roleRow = document.createElement('div');
  roleRow.className = 'field-row';
  roleRow.style.marginBottom = '4px';

  const roleSelect = document.createElement('select');
  roleSelect.className = 'field-input';
  roleSelect.dataset.idx = idx;
  roleSelect.dataset.field = 'role';
  const customRoleOpt = document.createElement('option');
  customRoleOpt.value = 'custom';
  customRoleOpt.textContent = 'custom role';
  roleSelect.appendChild(customRoleOpt);

  // Group roles by category
  const roleGroups = {};
  const roleGroupOrder = [];
  cachedRoles.forEach(r => {
    const cat = r.category || 'other';
    if (!roleGroups[cat]) { roleGroups[cat] = []; roleGroupOrder.push(cat); }
    roleGroups[cat].push(r);
  });
  roleGroupOrder.forEach(cat => {
    const og = document.createElement('optgroup');
    og.label = cat;
    roleGroups[cat].forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.name;
      opt.textContent = `${r.name} — ${r.description}`;
      if (agent.role === r.name) opt.selected = true;
      og.appendChild(opt);
    });
    roleSelect.appendChild(og);
  });

  roleSelect.addEventListener('change', () => {
    const role = cachedRoles.find(r => r.name === roleSelect.value);
    if (role) {
      const promptEl = group.querySelector('[data-field="system_prompt"]');
      if (promptEl) promptEl.value = role.system_prompt;
      wizardState.agents[idx].system_prompt = role.system_prompt;
      wizardState.agents[idx].role = roleSelect.value;
    }
  });

  const roleWrap = document.createElement('div');
  roleWrap.style.cssText = 'display:flex;flex-direction:column;gap:0;flex:1';
  roleWrap.appendChild(roleSelect);
  roleRow.appendChild(roleWrap);
  attachSelectSearch(roleSelect, '⌕ filter roles...');

  const promptArea = document.createElement('textarea');
  promptArea.className = 'field-input';
  promptArea.style.cssText = 'width:100%;min-height:50px;resize:vertical';
  promptArea.value = agent.system_prompt;
  promptArea.placeholder = 'system prompt...';
  promptArea.dataset.idx = idx;
  promptArea.dataset.field = 'system_prompt';

  group.append(headerRow, pmRow, roleRow, promptArea);
  container.appendChild(group);
}

function saveStep2() {
  const list = document.getElementById('wizard-agent-list');
  if (!list) return;
  list.querySelectorAll('[data-idx]').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const field = el.dataset.field;
    if (wizardState.agents[idx] && field) {
      wizardState.agents[idx][field] = el.value;
    }
  });
}

// Step 3: rules
function renderStep3() {
  $wizardTitle.textContent = 'debate rules';
  $wizardBody.textContent = '';

  const topicGroup = document.createElement('div');
  topicGroup.className = 'field-group';

  const topicLabelRow = document.createElement('div');
  topicLabelRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:4px';
  const topicLabel = document.createElement('label');
  topicLabel.className = 'field-label';
  topicLabel.style.margin = '0';
  topicLabel.textContent = 'topics (one per line)';

  const enhanceBtn = document.createElement('button');
  enhanceBtn.className = 'btn-enhance';
  enhanceBtn.innerHTML = '✦<span class="tooltip">refine topic with configured AI</span>';
  enhanceBtn.addEventListener('click', async () => {
    const text = topicArea.value.trim();
    if (!text) return;
    enhanceBtn.classList.add('loading');
    try {
      const { invoke } = window.__TAURI__.core;
      const refined = await invoke('enhance_topic', { text });
      topicArea.value = refined;
      wizardState.topics = refined;
    } catch (err) {
      showToast(`enhance failed: ${err}`);
    } finally {
      enhanceBtn.classList.remove('loading');
    }
  });

  topicLabelRow.append(topicLabel, enhanceBtn);

  const topicArea = document.createElement('textarea');
  topicArea.className = 'field-input';
  topicArea.id = 'wizard-topics';
  topicArea.style.cssText = 'width:100%;min-height:60px;resize:vertical';
  topicArea.value = wizardState.topics;
  topicArea.placeholder = 'e.g., should we use rust or go for the backend?';
  topicGroup.append(topicLabelRow, topicArea);

  const visGroup = document.createElement('div');
  visGroup.className = 'field-group';
  const visLabel = document.createElement('label');
  visLabel.className = 'field-label';
  visLabel.textContent = 'visibility';
  const visSelect = document.createElement('select');
  visSelect.className = 'field-input';
  visSelect.id = 'wizard-visibility';
  ['group', 'directed'].forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v === 'group' ? 'group chat (all see all)' : 'directed (only see messages to you)';
    if (wizardState.visibility === v) opt.selected = true;
    visSelect.appendChild(opt);
  });
  visGroup.append(visLabel, visSelect);

  const termGroup = document.createElement('div');
  termGroup.className = 'field-group';
  const termLabel = document.createElement('label');
  termLabel.className = 'field-label';
  termLabel.textContent = 'termination mode';
  const termSelect = document.createElement('select');
  termSelect.className = 'field-input';
  termSelect.id = 'wizard-termination';
  [
    ['fixed', 'fixed rounds'],
    ['topic', 'topic-based'],
    ['manual', 'manual stop'],
    ['convergence', 'convergence detection'],
  ].forEach(([val, label]) => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = label;
    if (wizardState.termination === val) opt.selected = true;
    termSelect.appendChild(opt);
  });
  termGroup.append(termLabel, termSelect);

  const roundGroup = document.createElement('div');
  roundGroup.className = 'field-group';
  const roundLabel = document.createElement('label');
  roundLabel.className = 'field-label';
  roundLabel.textContent = 'max rounds';
  const roundInput = document.createElement('input');
  roundInput.className = 'field-input';
  roundInput.id = 'wizard-max-rounds';
  roundInput.type = 'number';
  roundInput.min = '1';
  roundInput.max = '100';
  roundInput.value = wizardState.maxRounds;
  roundInput.style.width = '80px';
  roundGroup.append(roundLabel, roundInput);

  $wizardBody.append(topicGroup, visGroup, termGroup, roundGroup);
}

function saveStep3() {
  const topics = document.getElementById('wizard-topics');
  if (topics) wizardState.topics = topics.value;
  const vis = document.getElementById('wizard-visibility');
  if (vis) wizardState.visibility = vis.value;
  const term = document.getElementById('wizard-termination');
  if (term) wizardState.termination = term.value;
  const rounds = document.getElementById('wizard-max-rounds');
  if (rounds) wizardState.maxRounds = parseInt(rounds.value) || 10;
}

// Step 4: review
function renderStep4() {
  $wizardTitle.textContent = 'review & launch';
  $wizardBody.textContent = '';

  const summary = document.createElement('div');
  summary.style.cssText = 'font-size:10px;color:var(--text);line-height:1.8';

  const teamLine = document.createElement('div');
  teamLine.textContent = `team: ${wizardState.teamName || '(unnamed)'}`;

  const agentLines = document.createElement('div');
  agentLines.style.margin = '6px 0';
  wizardState.agents.forEach(a => {
    const line = document.createElement('div');
    line.style.color = 'var(--muted)';
    line.textContent = `  ${a.name} — ${a.provider || '?'}/${a.model || '?'} (${a.role || 'custom'})`;
    agentLines.appendChild(line);
  });

  const topicLine = document.createElement('div');
  const topicList = wizardState.topics.split('\n').filter(t => t.trim());
  topicLine.textContent = `topics: ${topicList.length || 'none'}`;

  const rulesLine = document.createElement('div');
  rulesLine.textContent = `visibility: ${wizardState.visibility} · termination: ${wizardState.termination} · max rounds: ${wizardState.maxRounds}`;

  summary.append(teamLine, agentLines, topicLine, rulesLine);

  const warnings = [];
  if (!wizardState.teamName) warnings.push('no team name set');
  wizardState.agents.forEach(a => {
    if (!a.provider) warnings.push(`${a.name}: no provider selected`);
    if (!a.model) warnings.push(`${a.name}: no model selected`);
  });

  if (warnings.length > 0) {
    const warnDiv = document.createElement('div');
    warnDiv.style.cssText = 'margin-top:10px;padding:6px 10px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:4px;font-size:9px;color:var(--amber)';
    warnings.forEach(w => {
      const line = document.createElement('div');
      line.textContent = `⚠ ${w}`;
      warnDiv.appendChild(line);
    });
    summary.appendChild(warnDiv);
  }

  $wizardBody.appendChild(summary);
}

async function launchDebate() {
  const { invoke } = window.__TAURI__.core;

  if (!wizardState.teamName) {
    showToast('enter a team name');
    return;
  }

  const hasErrors = wizardState.agents.some(a => !a.provider || !a.model);
  if (hasErrors) {
    showToast('all agents need a provider and model');
    return;
  }

  const topicList = wizardState.topics.split('\n').filter(t => t.trim());

  try {
    const debateConfig = {
      team_name: wizardState.teamName,
      agents: wizardState.agents.map(a => ({
        name: a.name,
        provider: a.provider,
        model: a.model,
        system_prompt: a.system_prompt,
        role: a.role || '',
      })),
      topics: topicList,
      visibility: wizardState.visibility,
      termination: wizardState.termination,
      max_rounds: wizardState.maxRounds,
      convergence_threshold: wizardState.convergenceThreshold,
    };

    await invoke('create_debate', { config: debateConfig });
    await invoke('start_debate_cmd', { team: wizardState.teamName });

    // Drop prior messages for this team from memory so the new debate starts clean.
    // Old messages are archived on disk at ~/.claude/teams/{team}/archive/.
    messages = messages.filter(m => m.team !== wizardState.teamName);

    populateTeams([wizardState.teamName]);
    $teamSelect.value = wizardState.teamName;
    currentFilter = wizardState.teamName;
    applyFilter();

    $wizardOverlay.classList.remove('visible');
    showToast(`debate "${wizardState.teamName}" started`);
  } catch (err) {
    showToast(`error: ${err}`);
  }
}

// ── Debate control bar ───────────────────────────────────────
const $debateControls = document.getElementById('debate-controls');
const $debateStatusDot = document.getElementById('debate-status-dot');
const $debateStatusText = document.getElementById('debate-status-text');
const $debateRoundText = document.getElementById('debate-round-text');
let activeDebateTeam = null;

async function initDebateControls() {
  const { listen } = window.__TAURI__.event;

  await listen('debate-status', ({ payload }) => {
    activeDebateTeam = payload.team;
    $debateControls.classList.add('active');
    $debateStatusDot.className = payload.status;
    $debateStatusDot.id = 'debate-status-dot';
    $debateStatusDot.classList.add(payload.status);
    $debateStatusText.textContent = payload.status;
    $debateRoundText.textContent = payload.round > 0 ? `· round ${payload.round}` : '';

    if (payload.status === 'error' && payload.error_msg) {
      $debateRoundText.textContent += ` · ${payload.error_msg}`;
    }

    if (payload.status === 'stopped' || payload.status === 'converged' || payload.status === 'error') {
      document.getElementById('btn-pause').textContent = '⏸';
      clearThinking();
    }
  });
}

document.getElementById('btn-pause').addEventListener('click', async () => {
  if (!activeDebateTeam) return;
  const { invoke } = window.__TAURI__.core;
  try {
    await invoke('pause_debate', { team: activeDebateTeam });
    const btn = document.getElementById('btn-pause');
    btn.textContent = btn.textContent === '⏸' ? '▶' : '⏸';
  } catch (err) {
    showToast(`error: ${err}`);
  }
});

document.getElementById('btn-stop').addEventListener('click', async () => {
  if (!activeDebateTeam) return;
  const { invoke } = window.__TAURI__.core;
  try {
    await invoke('stop_debate', { team: activeDebateTeam });
    showToast('debate stopped');
  } catch (err) {
    showToast(`error: ${err}`);
  }
});

document.getElementById('btn-restart').addEventListener('click', async () => {
  if (!activeDebateTeam) return;
  const { invoke } = window.__TAURI__.core;
  try {
    messages = messages.filter(m => m.team !== activeDebateTeam);
    applyFilter();
    await invoke('restart_debate', { team: activeDebateTeam });
    document.getElementById('btn-pause').textContent = '⏸';
    showToast('debate restarted');
  } catch (err) {
    showToast(`error: ${err}`);
  }
});
</script>
</body>
